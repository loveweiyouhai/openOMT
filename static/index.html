<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenFTP - 远程文件管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
        <span>OpenFTP</span>
      </div>
      <div class="header-actions">
        <span id="statusBadge" class="badge badge-offline">未连接</span>
        <button type="button" id="btnDisconnect" class="btn btn-ghost" disabled>断开</button>
      </div>
    </header>

    <main class="main">
      <aside class="sidebar">
        <section class="panel connect-panel">
          <h2 class="panel-title">连接服务器</h2>
          <form id="formConnect" class="form">
            <div class="field">
              <label>协议</label>
              <select name="protocol" id="protocol">
                <option value="sftp">SFTP (SSH)</option>
                <option value="ftp">FTP</option>
              </select>
            </div>
            <div class="field">
              <label>主机</label>
              <input type="text" name="host" id="host" placeholder="192.168.1.1 或 example.com" required>
            </div>
            <div class="field row">
              <div class="field">
                <label>端口</label>
                <input type="number" name="port" id="port" placeholder="22 / 21" min="1" max="65535">
              </div>
              <div class="field flex-1">
                <label>用户名</label>
                <input type="text" name="username" id="username" placeholder="用户名">
              </div>
            </div>
            <div class="field">
              <label>密码</label>
              <input type="password" name="password" id="password" placeholder="密码">
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="btnConnect">连接</button>
          </form>
        </section>

        <section class="panel path-panel">
          <h2 class="panel-title">远程路径</h2>
          <div class="path-bar">
            <input type="text" id="currentPath" value="/" placeholder="/" readonly>
            <button type="button" id="btnGoUp" class="btn btn-ghost btn-icon" title="上一级">↑</button>
          </div>
          <div class="path-history">
            <button type="button" class="btn btn-ghost btn-sm" data-path="/">/ 根目录</button>
            <button type="button" class="btn btn-ghost btn-sm" data-path="">. 当前目录</button>
          </div>
        </section>

        <section class="panel upload-panel">
          <h2 class="panel-title">上传到当前目录</h2>
          <div class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" multiple hidden>
            <p>拖拽文件到此处，或 <button type="button" class="btn btn-link" id="btnSelectFile">选择文件</button></p>
          </div>
        </section>
      </aside>

      <section class="content">
        <div class="toolbar">
          <span class="path-display" id="pathDisplay">/</span>
          <button type="button" id="btnRefresh" class="btn btn-ghost" disabled>刷新</button>
        </div>
        <div class="file-list-wrap">
          <table class="file-table" id="fileTable">
            <thead>
              <tr>
                <th class="col-name">名称</th>
                <th class="col-size">大小</th>
                <th class="col-time">修改时间</th>
                <th class="col-actions">操作</th>
              </tr>
            </thead>
            <tbody id="fileTableBody">
              <tr class="empty-row">
                <td colspan="4">请先连接服务器并选择路径</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div id="message" class="message" role="alert" hidden></div>
      </section>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
